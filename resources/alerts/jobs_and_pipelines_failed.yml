resources:
  alerts:
    jobs_and_pipelines_failed:
      display_name: jobs_and_pipelines_failed
      query_text: "SELECT 0 AS indicator;"
      warehouse_id: ${resources.sql_warehouses.serverless_starter_warehouse.id}
      evaluation:
        comparison_operator: GREATER_THAN
        source:
          name: indicator
          display: indicator
        threshold:
          value:
            double_value: 0.0
      schedule:
        quartz_cron_schedule: "0 0 * * * ?"
        timezone_id: UTC
        pause_status: UNPAUSED
