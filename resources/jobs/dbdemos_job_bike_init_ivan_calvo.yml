resources:
  jobs:
    dbdemos_job_bike_init_ivan_calvo:
      name: dbdemos_job_bike_init_ivan_calvo
      max_concurrent_runs: 1
      tasks:
        - task_key: init_data
          notebook_task:
            notebook_path: ../../src/dbdemos_job_bike_init_ivan_calvo/01-Bike-Data-generator.py
            source: WORKSPACE
          depends_on: []

        - task_key: start_sdp_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.dbdemos_pipeline_bike_icalvo_hackaton_ws_catalog_ivandb2.id}
            full_refresh: true
          depends_on:
            - task_key: init_data
