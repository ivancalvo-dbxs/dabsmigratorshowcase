bundle:
  name: bike_sharing_bundle

include:
  - resources/**/*.yml

variables:
  catalog:
    description: Default Unity Catalog catalog
    default: "icalvo_hackaton_ws_catalog"

  schema:
    description: Default Unity Catalog schema
    default: "ivandb2"

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://fevm-icalvo-hackaton-ws.cloud.databricks.com

  staging:
    mode: production
    workspace:
      host: https://fevm-icalvo-hackaton-ws.cloud.databricks.com
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    run_as:
      service_principal_name: ${var.staging_sp_app_id}

  prod:
    mode: production
    workspace:
      host: https://fevm-icalvo-hackaton-ws.cloud.databricks.com
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    run_as:
      service_principal_name: ${var.prod_sp_app_id}
    permissions:
      - level: CAN_VIEW
        group_name: users
